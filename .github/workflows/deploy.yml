name: Build and deploy

on:
  schedule:
    # 06:17 UTC daily — off-peak for Wahapedia.
    - cron: "17 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install --quiet beautifulsoup4

      - name: Build site
        run: |
          mkdir -p dist
          cp -r web/. dist/
          python scripts/sync.py dist/data
          # Stamp a unique cache version into the service worker so each
          # deploy invalidates the previous shell cache. Using the short
          # commit SHA means a no-op cron rebuild keeps the same cache,
          # while a real source change rolls it forward.
          sed -i "s/__BUILD_ID__/${GITHUB_SHA::7}/" dist/sw.js
          echo "Service worker stamped with build ID: ${GITHUB_SHA::7}"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
